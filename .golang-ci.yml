version: "2"
linters:
  default: all
  enable:
    - wsl_v5
  disable:
    - copyloopvar
    - depguard
    - err113
    - exhaustruct
    - forbidigo
    - gochecknoglobals
    - intrange
    - nolintlint
    - paralleltest
    - revive
    - rowserrcheck
    - sqlclosecheck
    - testpackage
    - varnamelen
    - wastedassign
    - wsl
    - wrapcheck
  settings:
    lll:
      line-length: 180
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
